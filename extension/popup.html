<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-icon">R</div>
    <h1>Resume Auto-Apply</h1>
    <div class="status-dot checking" id="connectionDot" title="Checking backend..."></div>
  </div>

  <!-- Status bar -->
  <div class="status-bar" id="statusBar">
    <span class="spinner" id="statusSpinner" style="display:none"></span>
    <span id="statusText"></span>
  </div>

  <!-- Profile & Options -->
  <div class="section">
    <div class="section-label">Configuration</div>
    <div class="field-row">
      <div class="field-label">Profile</div>
      <select id="profileSelect" disabled>
        <option value="">Loading...</option>
      </select>
    </div>
    <div class="options-grid">
      <div class="field-row">
        <div class="field-label">Base resume</div>
        <select id="baseSelect" disabled>
          <option value="">Loading...</option>
        </select>
      </div>
      <div class="field-row">
        <div class="field-label">Prompt</div>
        <select id="promptSelect" disabled>
          <option value="">Loading...</option>
        </select>
      </div>
      <div class="field-row">
        <div class="field-label">DOCX template</div>
        <select id="docxSelect" disabled>
          <option value="1">Template 1</option>
          <option value="2">Template 2</option>
          <option value="3">Template 3</option>
          <option value="4">Template 4</option>
          <option value="5">Template 5</option>
        </select>
      </div>
      <div class="field-row">
        <div class="field-label">Resume status</div>
        <div>
          <span class="result-badge not-ready" id="resumeBadge">Not generated</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Job Description -->
  <div class="section">
    <div class="section-label">Job Description</div>
    <div class="jd-preview empty" id="jdPreview">Click "Fetch JD" to scrape from this page</div>
    <div style="margin-top:8px">
      <button class="btn btn-secondary" id="btnFetchJD">Fetch Job Description</button>
    </div>
  </div>

  <!-- Actions -->
  <div class="section">
    <div class="section-label">Actions</div>
    <div class="btn-group">
      <button class="btn btn-primary" id="btnGenerate" disabled>Generate Resume</button>
      <button class="btn btn-success" id="btnAutoFill" disabled>Auto-Fill & Upload Resume</button>
    </div>
  </div>

  <!-- Progress Steps -->
  <div class="section" id="stepsSection" style="display:none">
    <div class="section-label">Progress</div>
    <div class="steps" id="stepsContainer"></div>
  </div>

  <div class="footer">Backend: localhost:8000</div>

  <script src="popup.js"></script>
</body>
</html>
